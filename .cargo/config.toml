# Minimal cargo config for the buhera repo root.
#
# The previous version of this file was written for the legacy VPOS
# workspace and force-fed `-C lto=fat`, `-C target-cpu=native`,
# `-C panic=abort`, custom profiles, custom environment variables, and a
# host of `[unstable]` flags. Under modern cargo + rustc 1.96 those
# settings break every dependency build script (which compile with
# `-C embed-bitcode=no` and therefore cannot tolerate `-C lto=fat`).
#
# The legacy config is preserved at `config.toml.legacy-vpos.bak` in
# case anything ever needs to consult it; nothing currently depends on
# it. The active config is intentionally minimal: it just shares the
# build directory so sibling workspaces don't trample each other.

[build]
target-dir = "target"
incremental = true

# Convenient aliases shared across all workspaces under this repo.
[alias]
b = "build"
br = "build --release"
c = "check"
ca = "check --all-targets --all-features"
t = "test"
ta = "test --all-features"
