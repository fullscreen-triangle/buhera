# Keep the build artifacts inside buhera-os so the standalone OS is not
# affected by any legacy workspace at the repo root.
[build]
target-dir = "target"

# Some rustc 1.89+ builds on Windows pass `-C embed-bitcode=no` to build
# scripts implicitly. Explicitly enable embed-bitcode so it composes
# with any LTO setting that downstream crates may set.
[target.'cfg(all())']
rustflags = ["-C", "embed-bitcode=yes"]
